name: Build APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
        working-directory: claude-fable-5/app
      - run: flutter build apk --release
        working-directory: claude-fable-5/app
      - run: cp claude-fable-5/app/build/app/outputs/flutter-apk/app-release.apk morphcook.apk
      - uses: actions/upload-artifact@v4
        with:
          name: morphcook-apk
          path: morphcook.apk
      # Direct, login-free download link for sideloading:
      # https://github.com/albrechtlb/morphcook/releases/download/apk-latest/morphcook.apk
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: MorphCook APK (latest)
          body: Aktueller Release-Build für die private Installation auf Android.
          files: morphcook.apk
