name: morphcook
description: A nostalgic cookbook app that adapts recipes to your dietary needs
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

  # Fonts
  google_fonts: ^6.1.0

  # State management
  provider: ^6.1.1

  # Local storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Animations
  flutter_animate: ^4.5.0

  # UI helpers
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0

  # Backup/restore
  path_provider: ^2.1.1
  archive: ^3.4.10
  encrypt: ^5.0.3
  share_plus: ^11.0.0

  # Date/time
  intl: ^0.19.0

  # Misc
  collection: ^1.18.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  mockito: ^5.4.4
  fake_async: ^1.3.1

flutter:
  uses-material-design: true
  assets:
    - assets/ontology.json
    - assets/dishes.json
    - assets/core-recipes.json
    - assets/extended-recipes.json
    - assets/ingredients.json
    - assets/faqs.json
    - assets/partition-manifest.json
    - assets/ingredient-guide.json
