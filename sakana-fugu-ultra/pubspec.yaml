name: morphcook
description: Offline Flutter cookbook where every dish has authored variants for every body.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3
  pointycastle: ^4.0.0
  path_provider: ^2.1.5
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/partition-manifest.json
    - assets/core-recipes.json
    - assets/extended-recipes.json
    - assets/cuisine-italian.json
    - assets/cuisine-asian.json
    - assets/cuisine-middle-eastern.json
    - assets/dishes.json
    - assets/ontology.json
    - assets/ingredients.json
    - assets/ingredient-guide.json
    - assets/faqs.json
  fonts:
    - family: Playfair Display
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
        - asset: assets/fonts/PlayfairDisplay-Italic.ttf
          style: italic
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
        - asset: assets/fonts/JetBrainsMono-Italic.ttf
          style: italic
    - family: Caveat
      fonts:
        - asset: assets/fonts/Caveat-Regular.ttf
