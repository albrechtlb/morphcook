name: morphcook
description: "MorphCook — the same dish exists for every body."
publish_to: 'none'
version: 1.2.0+5

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4
  share_plus: ^12.0.1
  pointycastle: ^4.0.0
  cupertino_icons: ^1.0.8
  file_picker: ^11.0.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/partition-manifest.json
    - assets/core-recipes.json
    - assets/extended-recipes.json
    - assets/cuisine-italian.json
    - assets/cuisine-asian.json
    - assets/cuisine-middle-eastern.json
    - assets/cuisine-indian.json
    - assets/cuisine-mexican.json
    - assets/cuisine-european.json
    - assets/pop-culture.json
    - assets/dishes.json
    - assets/ontology.json
    - assets/ingredients.json
    - assets/ingredient-guide.json
    - assets/faqs.json
    - assets/mo-logo.png

  fonts:
    - family: Playfair Display
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
        - asset: assets/fonts/PlayfairDisplay-Italic.ttf
          style: italic
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Italic.ttf
          style: italic
    - family: Caveat
      fonts:
        - asset: assets/fonts/Caveat-Regular.ttf
