name: morphcook
description: "MorphCook — every body gets a full cookbook. Offline Flutter recipe app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.1.2
  flutter_animate: ^4.5.0
  path_provider: ^2.1.4
  share_plus: ^10.0.0
  file_picker: ^8.1.2
  crypto: ^3.0.6
  archive: ^3.6.1
  collection: ^1.18.0
  intl: ^0.19.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/partitions/
